[tool.uv.workspace]
members = [
@MEMBERS@
]

[tool.uv.sources]
@SOURCES@

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
# Virtual package — workspace root only.
skip-excluded-dirs = true

[tool.ruff]
line-length = 110
target-version = "@PYTAG@"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.mypy]
python_version = "@PYVER@"
ignore_missing_imports = true
