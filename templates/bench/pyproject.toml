[project]
name = "@BENCH_NAME@"
version = "0.1.0"
description = "Frappe bench workspace managed by frappe-nix"
requires-python = "@REQUIRES_PYTHON@"
readme = "README.md"

# frappe-bench provides the `bench` CLI; setuptools is kept in the venv because
# several transitive deps import pkg_resources at runtime. It is left
# unconstrained so apps that pin an exact setuptools (e.g. payments) win instead
# of conflicting with a floor here.
dependencies = [
    "frappe-bench>=5.29.0",
    "setuptools",
]

# Dev-only tools — in the devenv shell, excluded from production containers.
[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "pydantic>=2.12.5",
    "pytest>=9.0.2",
    "responses",
    "ruff>=0.15.0",
    "semgrep",
]

[tool.uv]
# uv workspace over all apps; this root is a virtual package (no wheel built).
package = false
# Resolve conflicts between frappe-bench (the CLI) and frappe. Seeded from the
# frappe-nix preset; add entries here if `uv lock` reports an unsatisfiable
# requirement, then re-run `uv lock`.
override-dependencies = @OVERRIDES@

# Build-time deps for older Frappe/ERPNext packages that predate PEP 517/518 and
# rely on setuptools/pkg_resources. uv2nix consumes this so the Nix build needs
# no setuptools overlay. Unused entries are ignored, so this is a safe superset.
[tool.uv.extra-build-dependencies]
"cairocffi" = ["setuptools", "cffi", "pycparser"]
"backcall" = ["setuptools"]
"backoff" = ["setuptools"]
"barcodenumber" = ["setuptools"]
